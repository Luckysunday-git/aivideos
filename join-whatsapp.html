<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to AI Video Creation Class...</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 50px;
        background-color: #f7f4ed;
        color: #333;
      }

      p {
        font-size: 18px;
        margin-top: 20px;
      }

      .loader {
        border: 6px solid #f3f3f3;
        border-top: 6px solid #27ae60;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      .fallback-btn {
        margin-top: 30px;
        display: inline-block;
        background-color: #27ae60;
        color: white;
        padding: 14px 22px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 700;
        font-size: 16px;
        box-shadow: 0 8px 20px rgba(39, 174, 96, 0.25);
        transition: all 0.3s ease;
      }

      .fallback-btn:hover {
        background-color: #1f8a4d;
        transform: translateY(-2px);
      }

      .fallback-btn:active {
        transform: scale(0.98);
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div class="loader"></div>

    <p>Redirecting you to the AI Video Creation Class WhatsApp group...</p>

    <a
      class="fallback-btn"
      href="https://chat.whatsapp.com/KJCm7CJYpEqLFleitfbS9i"
      target="_blank"
    >
      Click Here to Join the Clsss Now
    </a>

    <script>
      let whatsappLink = "https://chat.whatsapp.com/KJCm7CJYpEqLFleitfbS9i";

      setTimeout(function () {
        window.location.href = whatsappLink;
      }, 1000);
    </script>
  </body>
</html>
